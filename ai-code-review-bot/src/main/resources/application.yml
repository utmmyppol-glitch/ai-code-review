spring:
  application:
    name: ai-code-review-bot

  datasource:
    url: jdbc:mysql://localhost:3306/code_review?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=Asia/Seoul
    username: root
    password:
    driver-class-name: com.mysql.cj.jdbc.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true

openai:
  api-key: ${OPENAI_API_KEY:demo-key}
  model: gpt-4o-mini

github:
  token: ${GITHUB_TOKEN:demo-token}
  webhook-secret: ${GITHUB_WEBHOOK_SECRET:demo-secret}

server:
  port: 8082
